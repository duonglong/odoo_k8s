[options]
; ---------------------------------------------
; Odoo Configuration (defaults for K8s deploy)
; Override via env vars in entrypoint or ConfigMap
; ---------------------------------------------

addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; Admin
admin_passwd = False
list_db = True

; Performance
workers = 0
max_cron_threads = 0
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = 300

; Logging
log_level = info
log_handler = :INFO
logfile = None

; Network
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; Database (overridden by entrypoint env vars)
db_host = postgres
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False
db_maxconn = 64

ir_attachment.location = db