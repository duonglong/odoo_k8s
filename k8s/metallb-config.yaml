# MetalLB Configuration for bare-metal Kubernetes
# Assigns real IPs from your network to LoadBalancer services

---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    # Reserve a range of unused IPs on your network
    # Adjust this to match your actual network (e.g., 10.0.0.200-10.0.0.210)
    - 192.168.56.200-192.168.56.210
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default
  namespace: metallb-system
spec:
  ipAddressPools:
    - default-pool
