apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: odoo-stack
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odoo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoo
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: odoo-stack
    spec:
      initContainers:
        # 1. Merge admin_passwd from Secret into odoo.conf
        - name: build-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-template/odoo.conf /config/odoo.conf
              echo "admin_passwd = $ADMIN_PASSWD" >> /config/odoo.conf
              echo "Config built with admin_passwd injected."
          env:
            - name: ADMIN_PASSWD
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: admin-password
          volumeMounts:
            - name: odoo-config-template
              mountPath: /config-template
            - name: odoo-config
              mountPath: /config
        # 2. Wait for PostgreSQL
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at $DB_HOST:$DB_PORT..."
              until nc -z $DB_HOST $DB_PORT; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          envFrom:
            - configMapRef:
                name: odoo-env
      containers:
        - name: odoo
          image: docker.io/gnold/odoo-k8s:19.0
          imagePullPolicy: Always
          # Disable cron on web pods — handled by cron-deployment
          args: ["--max-cron-threads=0"]
          ports:
            - containerPort: 8069
              name: http
            - containerPort: 8072
              name: longpolling
          env:
            # Map DB_HOST/DB_PORT → HOST/PORT (Odoo entrypoint expects HOST/PORT)
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: odoo-env
                  key: DB_HOST
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: odoo-env
                  key: DB_PORT
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: db-user
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: db-password
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-config
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
              readOnly: true
      volumes:
        - name: odoo-data
          emptyDir: {}
        - name: odoo-config
          emptyDir: {}  # Populated by build-config init container
        - name: odoo-config-template
          configMap:
            name: odoo-config
