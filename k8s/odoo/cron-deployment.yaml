apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-cron
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/component: cron
    app.kubernetes.io/part-of: odoo-stack
spec:
  # Only 1 cron worker — prevents duplicate cron execution
  replicas: 1
  strategy:
    type: Recreate  # No rolling update — only one cron worker at a time
  selector:
    matchLabels:
      app.kubernetes.io/name: odoo
      app.kubernetes.io/component: cron
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoo
        app.kubernetes.io/component: cron
        app.kubernetes.io/part-of: odoo-stack
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at $DB_HOST:$DB_PORT..."
              until nc -z $DB_HOST $DB_PORT; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: DB_HOST
              value: "192.168.56.1"
            - name: DB_PORT
              value: "5432"
      containers:
        - name: odoo-cron
          image: docker.io/gnold/odoo-k8s:19.0
          imagePullPolicy: Always
          # Run Odoo without HTTP server — cron only
          args: ["--no-http", "--max-cron-threads=1"]
          env:
            - name: HOST
              value: "192.168.56.1"
            - name: PORT
              value: "5432"
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: db-user
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import psutil; [p for p in psutil.process_iter() if 'odoo' in p.name()]"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-config
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
              readOnly: true
      volumes:
        - name: odoo-data
          emptyDir: {}
        - name: odoo-config
          configMap:
            name: odoo-config
