apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-cron
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/component: cron
    app.kubernetes.io/part-of: odoo-stack
spec:
  # Only 1 cron worker — prevents duplicate cron execution
  replicas: 1
  strategy:
    type: Recreate  # No rolling update — only one cron worker at a time
  selector:
    matchLabels:
      app.kubernetes.io/name: odoo
      app.kubernetes.io/component: cron
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoo
        app.kubernetes.io/component: cron
        app.kubernetes.io/part-of: odoo-stack
    spec:
      initContainers:
        # 1. Merge admin_passwd from Secret into odoo.conf
        - name: build-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-template/odoo.conf /config/odoo.conf
              echo "admin_passwd = $ADMIN_PASSWD" >> /config/odoo.conf
              echo "Config built with admin_passwd injected."
          env:
            - name: ADMIN_PASSWD
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: admin-password
          volumeMounts:
            - name: odoo-config-template
              mountPath: /config-template
            - name: odoo-config
              mountPath: /config
        # 2. Wait for PostgreSQL
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at $DB_HOST:$DB_PORT..."
              until nc -z $DB_HOST $DB_PORT; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          envFrom:
            - configMapRef:
                name: odoo-env
      containers:
        - name: odoo-cron
          image: docker.io/gnold/odoo-k8s:19.0
          imagePullPolicy: Always
          # Run Odoo without HTTP server — cron only
          args: ["--no-http", "--max-cron-threads=1"]
          env:
            # Map DB_HOST/DB_PORT → HOST/PORT (Odoo entrypoint expects HOST/PORT)
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: odoo-env
                  key: DB_HOST
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: odoo-env
                  key: DB_PORT
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: db-user
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import psutil; [p for p in psutil.process_iter() if 'odoo' in p.name()]"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-config
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
              readOnly: true
      volumes:
        - name: odoo-data
          emptyDir: {}
        - name: odoo-config
          emptyDir: {}  # Populated by build-config init container
        - name: odoo-config-template
          configMap:
            name: odoo-config
