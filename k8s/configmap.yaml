apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/component: config
data:
  odoo.conf: |
    [options]
    addons_path = /mnt/extra-addons
    data_dir = /var/lib/odoo

    ; Admin
    admin_passwd = False
    list_db = True

    ; Performance
    workers = 2
    max_cron_threads = 1
    limit_memory_hard = 2684354560
    limit_memory_soft = 2147483648
    limit_time_cpu = 600
    limit_time_real = 1200
    limit_time_real_cron = 300

    ; Logging
    log_level = info
    log_handler = :INFO
    logfile = None

    ; Network
    http_port = 8069
    longpolling_port = 8072
    proxy_mode = True

    ; Database (overridden by env vars)
    db_host = postgres
    db_port = 5432
    db_name = False
    db_maxconn = 64
