# PostgreSQL Exporter Helm values
# Install: helm install pg-exporter prometheus-community/prometheus-postgres-exporter \
#            -n odoo -f monitoring/postgres-exporter-values.yaml

config:
  datasource:
    host: postgres
    user: odoo
    password: odoo
    port: "5432"
    database: postgres
    sslmode: disable

  # Custom queries for Odoo-specific monitoring
  queries: |-
    pg_database_size:
      query: "SELECT datname, pg_database_size(datname) as size_bytes FROM pg_database WHERE datname NOT IN ('template0','template1')"
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - size_bytes:
            usage: "GAUGE"
            description: "Database size in bytes"

    pg_active_connections:
      query: "SELECT datname, count(*) as count FROM pg_stat_activity WHERE state = 'active' GROUP BY datname"
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - count:
            usage: "GAUGE"
            description: "Number of active connections"

    pg_slow_queries:
      query: "SELECT datname, count(*) as count FROM pg_stat_activity WHERE state = 'active' AND now() - query_start > interval '5 seconds' GROUP BY datname"
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - count:
            usage: "GAUGE"
            description: "Number of queries running > 5 seconds"

serviceMonitor:
  enabled: true
  namespace: odoo

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
