# Odoo-specific Prometheus alerting rules
# These are loaded by kube-prometheus-stack via additionalPrometheusRules
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: odoo-alerts
  namespace: monitoring
  labels:
    release: monitoring  # Must match Helm release name
spec:
  groups:
    - name: odoo.rules
      rules:
        # ─── Pod Health ─────────────────────────────────
        - alert: OdooPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="odoo", container="odoo"}[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Odoo pod is crash-looping"
            description: "Pod {{ $labels.pod }} has restarted {{ $value | humanize }} times in the last 5 minutes."

        - alert: OdooPodsUnavailable
          expr: kube_deployment_status_replicas_available{namespace="odoo", deployment="odoo"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "No Odoo pods available"
            description: "All Odoo pods are down — service is unreachable."

        # ─── Resource Usage ─────────────────────────────
        - alert: OdooHighCPU
          expr: (rate(container_cpu_usage_seconds_total{namespace="odoo", container="odoo"}[5m]) / on(pod) kube_pod_container_resource_limits{namespace="odoo", container="odoo", resource="cpu"}) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Odoo CPU usage above 85%"
            description: "Pod {{ $labels.pod }} CPU at {{ $value | humanize }}% of limit for 10+ minutes."

        - alert: OdooHighMemory
          expr: (container_memory_usage_bytes{namespace="odoo", container="odoo"} / on(pod) kube_pod_container_resource_limits{namespace="odoo", container="odoo", resource="memory"}) * 100 > 90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Odoo memory usage above 90%"
            description: "Pod {{ $labels.pod }} memory at {{ $value | humanize }}% of limit."

        - alert: OdooOOMKill
          expr: kube_pod_container_status_last_terminated_reason{namespace="odoo", reason="OOMKilled"} > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Odoo pod killed by OOM"
            description: "Pod {{ $labels.pod }} was OOM-killed. Consider increasing memory limits."

        # ─── HPA Scaling ────────────────────────────────
        - alert: OdooHPAMaxedOut
          expr: kube_horizontalpodautoscaler_status_current_replicas{namespace="odoo"} == kube_horizontalpodautoscaler_spec_max_replicas{namespace="odoo"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Odoo HPA at maximum replicas"
            description: "HPA has been at max ({{ $value }}) replicas for 15+ minutes. Consider increasing maxReplicas."

    - name: postgres.rules
      rules:
        # ─── PostgreSQL Health ──────────────────────────
        - alert: PostgresDown
          expr: kube_pod_container_status_ready{namespace="odoo", container="postgres"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL is down"
            description: "PostgreSQL container is not ready — Odoo cannot function."

        - alert: PostgresHighConnections
          expr: pg_active_connections > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL active connections high"
            description: "{{ $value }} active connections (threshold: 50). Check for connection leaks."

        - alert: PostgresSlowQueries
          expr: pg_slow_queries > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Multiple slow PostgreSQL queries"
            description: "{{ $value }} queries running longer than 5 seconds."

        # ─── Storage ────────────────────────────────────
        - alert: PVCAlmostFull
          expr: (kubelet_volume_stats_used_bytes{namespace="odoo"} / kubelet_volume_stats_capacity_bytes{namespace="odoo"}) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC almost full"
            description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanize }}% full."
